        324: { name: "オーロラベール", type: "こおり", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "5ターンの間、相手の物理と特殊のダメージを半減する。味方が複数の場合は半減ではなく2/3になる。急所に当たった場合は軽減されない。天気が雪の時しか出せない。" },
        325: { name: "おきみやげ", type: "あく", cate: "変化", powe: "-", accu: 100, pp: 10, effe: "自分は「ひんし」にして相手の攻撃と特攻を2段階下げる。" },

        341: { name: "きりばらい", type: "ひこう", cate: "変化", powe: "-", accu: "-", pp: 15, effe: "相手の回避率を1段階下げる。相手の「リフレクター」などの効果や、お互いの「まきびし」などの設置技の効果を無効化する。" },
        342: { name: "きんぞくおん", type: "はがね", cate: "変化", powe: "-", accu: 85, pp: 40, effe: "相手の特防を2段階下げる。相手の「みがわり」状態を貫通する。" },

        344: { name: "グラスフィールド", type: "くさ", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "5ターンの間「グラスフィールド」にする。地面にいるポケモンは毎ターン最大HPの1/16回復し、くさタイプの威力が1.3倍になる。「じしん」「じならし」「マグニチュード」の威力が半減する。" },
        345: { name: "くろいきり", type: "こおり", cate: "変化", powe: "-", accu: "-", pp: 30, effe: "戦闘中のポケモン全員の能力変化を元に戻す。" },

        347: { name: "こうごうせい", type: "くさ", cate: "変化", powe: "-", accu: "-", pp: 5, effe: "天気が通常の時は最大HPの1/2、晴れ状態の時は最大HPの2/3、それ以外の時は最大HPの1/4回復する。" },

        350: { name: "コットンガード", type: "くさ", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "自分の防御を3段階上げる。" },

        352: { name: "こらえる", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "必ず先制できる。攻撃を受けてもHPを1だけ残して耐える。連続で出すと失敗しやすい。" },
        353: { name: "こわいかお", type: "ノーマル", cate: "変化", powe: "-", accu: 100, pp: 10, effe: "相手の素早さを2段階下げる。" },
        354: { name: "サイコフィールド", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "5ターンの間「サイコフィールド」にする。地面にいるすべてのポケモンは、相手の先制技を受けなくなり、エスパータイプの技の威力が1.3倍になる。" },
        355: { name: "サイドチェンジ", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 15, effe: "必ず先制できる。自分と味方1体の位置を交代する。" },
        356: { name: "さいはい", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 15, effe: "相手が最後に使用した技をその場でもう一度使わせる。『はかいこうせん』など反動のある技などは失敗する。" },

        362: { name: "じばそうさ", type: "でんき", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "自分と味方全体の特性が「プラス」「マイナス」のポケモンの防御と特防が1段階ずつ上がる。" },
        363: { name: "しびれごな", type: "くさ", cate: "変化", powe: "-", accu: 75, pp: 30, effe: "相手をまひ状態にする。でんき/くさタイプ、粉が効かない相手には無効。" },
        364: { name: "じゅうでん", type: "でんき", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "次に自分が使うでんきタイプの技の威力が2倍になる。自分の特防が1段階上がる。" },
        365: { name: "じゅうりょく", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 5, effe: "5ターンの間、すべてのポケモンの命中率が5/3倍になる。また、特性「ふゆう」や、ひこうタイプのポケモンにじめん技が当たるようになる。空中に留まる技が使えなくなり、使用している場合は解除される。" },
        366: { name: "しろいきり", type: "こおり", cate: "変化", powe: "-", accu: "-", pp: 30, effe: "5ターンの間、自分と味方のポケモンは能力を下げられなくなる。交代しても効果は続く。" },
        367: { name: "しんぴのまもり", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 25, effe: "5ターンの間、自分と味方は状態異常にならない。交代しても効果は続く。" },
        368: { name: "シンプルビーム", type: "ノーマル", cate: "変化", powe: "-", accu: 100, pp: 15, effe: "相手の特性が「たんじゅん」になる。" },
        369: { name: "スキルスワップ", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "自分と相手の特性を入れ替える。ただし、一部の特性は入れ替えられない。" },
        370: { name: "すてゼリフ", type: "あく", cate: "変化", powe: "-", accu: 100, pp: 20, effe: "相手の攻撃、特攻を1段階下げたあと、手持ちのポケモンと入れ替わる。相手の「みがわり」状態を貫通する。" },
        371: { name: "ステルスロック", type: "いわ", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "使用後、相手はポケモンを交代する度に、出てきたポケモンは最大HPの1/8のダメージを受ける。ダメージはタイプ相性の影響を受ける。" },
        372: { name: "すなあらし", type: "いわ", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "5ターンの間、天気を砂嵐にする。いわ・じめん・はがねタイプ以外のポケモンは、毎ターン最大HPの1/16のダメージを受ける。いわタイプのポケモンは特防が1.5倍になる。" },
        373: { name: "すなかけ", type: "じめん", cate: "変化", powe: "-", accu: 100, pp: 15, effe: "相手の命中率を1段階下げる。" },
        374: { name: "スピードスワップ", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "自分と相手の素早さを入れ替える。" },
        375: { name: "すりかえ", type: "あく", cate: "変化", powe: "-", accu: 100, pp: 10, effe: "相手と自分が持つ道具を入れ替える。片方しか道具を持っていない場合も成功する。" },
        376: { name: "せいちょう", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "自分の攻撃、特攻が1段階ずつ上がる。天気が晴れ状態の時は、2段階ずつ上がる。" },
        377: { name: "たくわえる", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "自分の防御と特防を1段階ずつ上げる。技「のみこむ」と「はきだす」の効果を上げる。3回までたくわえられる。" },
        378: { name: "ちいさくなる", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "自分の回避率を2段階上げる。ただし、「のしかかり」「ふみつけ」などの一部の技が必ず命中し威力2倍で受けるようになる。" },
        379: { name: "ちからをすいとる", type: "くさ", cate: "変化", powe: "-", accu: 100, pp: 10, effe: "相手の攻撃の能力値と同じ値だけ自分のHPを回復し、相手の攻撃を1段階下げる。すでに最大まで下がっていると失敗する。" },
        380: { name: "ちょうおんぱ", type: "ノーマル", cate: "変化", powe: "-", accu: 55, pp: 20, effe: "相手を1～4ターンの間こんらん状態にする。相手の「みがわり」状態を貫通する。" },
        381: { name: "ちょうのまい", type: "むし", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "自分の特攻、特防、素早さが1段階ずつ上がる。" },
        382: { name: "ちょうはつ", type: "あく", cate: "変化", powe: "-", accu: 100, pp: 20, effe: "3ターンの間、相手は変化技が使えなくなる。" },
        383: { name: "つきのひかり", type: "フェアリー", cate: "変化", powe: "-", accu: "-", pp: 5, effe: "天気が通常の時は最大HPの1/2、晴れ状態の時は最大HPの2/3、それ以外の時は最大HPの1/4回復する。" },
        384: { name: "つぶらなひとみ", type: "フェアリー", cate: "変化", powe: "-", accu: 100, pp: 30, effe: "必ず先制できる。相手の攻撃を1段階下げる。" },
        385: { name: "つぼをつく", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 30, effe: "HP以外の全能力の中からランダムで1つが2段階上がる。" },
        386: { name: "つめとぎ", type: "あく", cate: "変化", powe: "-", accu: "-", pp: 15, effe: "自分の攻撃と命中率が1段階ずつ上がる。" },
        387: { name: "つるぎのまい", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "自分の攻撃を2段階上げる。" },

        391: { name: "てんしのキッス", type: "フェアリー", cate: "変化", powe: "-", accu: 75, pp: 10, effe: "相手を1～4ターンの間こんらん状態にする。" },
        392: { name: "でんじは", type: "でんき", cate: "変化", powe: "-", accu: 90, pp: 20, effe: "相手をまひ状態にする。じめん/でんきタイプには無効。" },
        393: { name: "でんじふゆう", type: "でんき", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "5ターンの間、ふゆう状態となり、じめんタイプの技やフィールド状態などの効果を受けなくなる。" },
        394: { name: "とおせんぼう", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 5, effe: "ゴーストタイプ以外は交代できなくなる。自分が場を離れると効果は消える。" },
        395: { name: "トーチカ", type: "どく", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "必ず先制できる。使用したターンの間、相手の攻撃を防ぐと同時に、直接攻撃をした相手をどく状態にする。連続で使うと失敗しやすくなる。" },
        396: { name: "とおぼえ", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 40, effe: "自分と味方の攻撃を1段階ずつ上げる。味方が「みがわり」状態でも効果が発動する。" },

        398: { name: "どくどく", type: "どく", cate: "変化", powe: "-", accu: 90, pp: 10, effe: "相手をもうどく状態にする。どく/はがねタイプには無効。もうどく状態は受けるダメージが1/16、2/16〜と毎ターン徐々に増えていく。" },

        400: { name: "どくびし", type: "どく", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "使用後、相手はポケモンを交代する度に、出てきたポケモンがどく状態になる。2回使うともうどく状態になる。ひこうタイプや特性「ふゆう」のポケモンは影響を受けない。地面にいるどくタイプのポケモンが出ると効果がなくなる。" },
        401: { name: "とぐろをまく", type: "どく", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "自分の攻撃、防御、命中率が1段階ずつ上がる。" },
        402: { name: "とける", type: "どく", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "自分の防御を2段階上げる。" },

        404: { name: "トリックルーム", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 5, effe: "必ず後攻になる。5ターンの間、素早さが低いポケモンから攻撃できるようになる。必ず先制攻撃できる技には無効。効果ターン中に再び使用すると元に戻る。" },
        405: { name: "ドわすれ", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "自分の特防を2段階上げる。" },
        406: { name: "ないしょばなし", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "相手の特攻を1段階下げる。必ず命中する。相手の「みがわり」状態を貫通する。" },
        407: { name: "なかまづくり", type: "ノーマル", cate: "変化", powe: "-", accu: 100, pp: 15, effe: "相手の特性を自分と同じ特性にする。" },
        408: { name: "なかよくする", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "相手の攻撃を1段階下げる。必ず命中する。" },
        409: { name: "なきごえ", type: "ノーマル", cate: "変化", powe: "-", accu: 100, pp: 40, effe: "相手の攻撃を1段階下げる。相手の「みがわり」状態を貫通する。" },
        410: { name: "なまける", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 5, effe: "最大HPの半分を回復する。" },
        411: { name: "なみだめ", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "相手の攻撃と特攻を1段階ずつ下げる。必ず命中する。" },
        412: { name: "なやみのタネ", type: "くさ", cate: "変化", powe: "-", accu: 100, pp: 10, effe: "相手の特性を「ふみん」にする。「なまけ」など特定の特性だと失敗する。" },
        413: { name: "なりきり", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "自分の特性を相手の特性と同じにする。特定の特性はコピーできない。" },
        414: { name: "ニードルガード", type: "くさ", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "必ず先制できる。使用したターンの間、相手の攻撃を防ぐと同時に、直接攻撃をした相手の最大HPの1/8のダメージを与える。連続で使うと失敗しやすくなる。" },
        415: { name: "にほんばれ", type: "ほのお", cate: "変化", powe: "-", accu: "-", pp: 5, effe: "5ターンの間、天気を晴れ状態にする。ほのおタイプの技のダメージが1.5倍になり、みずタイプの技のダメージが半減する。こおり状態にならない。" },
        416: { name: "にらみつける", type: "ノーマル", cate: "変化", powe: "-", accu: 100, pp: 30, effe: "相手の防御を1段階下げる。" },
        417: { name: "ねがいごと", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "次ターン終了時に最大HPの半分を回復する。交代した場合は同じ位置のポケモンが回復する。" },
        418: { name: "ねごと", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "自分がねむり状態の時のみ使用可能。自分の持っている技のうち1つをランダムで使う。" },
        419: { name: "ねばねばネット", type: "むし", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "使用後、相手はポケモンを交代する度に、出てきたポケモンの素早さが1段階下がる。ひこうタイプや特性「ふゆう」のポケモンは影響を受けない。相手の場に既にねばねばネットが設置されている場合は失敗する。" },
        420: { name: "ねむりごな", type: "くさ", cate: "変化", powe: "-", accu: 75, pp: 15, effe: "相手を1～3ターンの間ねむり状態にする。くさタイプや粉が効かない相手には無効。" },
        421: { name: "ねむる", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 5, effe: "HPと状態異常を全回復した後、2ターンの間ねむり状態になる。" },
        422: { name: "ねをはる", type: "くさ", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "毎ターンHPが最大HPの1/16ずつ回復するが、交代できなくなる。じめんタイプの技が当たるようになる。" },
        423: { name: "のみこむ", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "「たくわえる」を使った数だけHPが多く回復する。1回目は最大HPの1/4、2回目は最大HPの1/2、3回目は全回復する。「たくわえる」を使っていない時は失敗する。" },
        424: { name: "のろい", type: "ゴースト", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "自分がゴーストタイプの時は自分のHPを最大HPの半分減らして、相手を「のろい」状態にする。のろい状態になると毎ターン、相手のHPが最大HPの1/4ずつ減る。ゴーストタイプ以外の場合、素早さが1段階下がり、攻撃と防御が1段階ずつ上がる。" },
        425: { name: "バトンタッチ", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 40, effe: "控えのポケモンと交代し、かかっている能力変化や補助効果を引き継ぐ。" },
        426: { name: "はねやすめ", type: "ひこう", cate: "変化", powe: "-", accu: "-", pp: 5, effe: "HPが最大HPの半分回復するが、使用したターンはひこうタイプではなくなる。" },
        427: { name: "はねる", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 40, effe: "なにも起こらない。" },
        428: { name: "はらだいこ", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "自分のHPを最大HPの半分だけ減らす代わりに、自分の攻撃を最大まで上げる。" },
        429: { name: "パワーシェア", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "自分と相手の攻撃と特攻を足して半分に分ける。" },
        430: { name: "パワースワップ", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "自分と相手の攻撃と特攻の能力変化を入れ替える。" },
        431: { name: "パワートリック", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "自分の攻撃と防御を入れ替える。ランクは変化しない。" },
        432: { name: "ひかりのかべ", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 30, effe: "5ターンの間、相手の特殊攻撃のダメージを半減する。味方が複数の場合は半減ではなく2/3になる。急所に当たった場合は軽減されない。" },
        433: { name: "ひっくりかえす", type: "あく", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "相手の全ての能力ランクの上昇値と下降値を逆にする。" },

        435: { name: "ファストガード", type: "かくとう", cate: "変化", powe: "-", accu: "-", pp: 15, effe: "必ず先制できる。自分と味方を相手の先制攻撃から守る。" },

        442: { name: "へんしん", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "一時的に、相手と同じポケモンになる。HP・持ち物・状態異常などはコピーされずそのままとなり、技のPPはすべて5になる。交代すると元に戻る。" },
        443: { name: "ぼうぎょしれい", type: "むし", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "自分の防御と特防ランクが1段階ずつ上がる。" },
        444: { name: "ほえる", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "必ず後攻になる。相手のポケモンを強制的に交代させる。必ず命中する。野生のポケモンの場合、相手が自分のレベルより高い場合は失敗する。相手の「みがわり」状態を貫通する。" },
        445: { name: "ほろびのうた", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 5, effe: "3ターン終了後に、この技を使った時に出ていた自分を含むすべてのポケモンは「ひんし」状態になる。それまでに交代したポケモンは効果が消える。「みがわり」状態を貫通する。" },
        446: { name: "まきびし", type: "じめん", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "使用後、相手はポケモンを交代する度に、出てきたポケモンがダメージを受ける。3回まで使うことができ、1回目は最大HPの1/8、2回目は最大HPの1/6、3回目は最大HPの1/4のダメージを与える。ひこうタイプや特性「ふゆう」のポケモンは影響を受けない。" },
        447: { name: "マジックルーム", type: "エスパー", cate: "変化", powe: "-", accu: "-", pp: 10, effe: "5ターンの間、すべてのポケモンの道具の効果がなくなる。" },
        448: { name: "まねっこ", type: "ノーマル", cate: "変化", powe: "-", accu: "-", pp: 20, effe: "最後に使われた技で相手に攻撃する。自分の技も対象となる。" },

    function isGuaranteedKO({
      power,
      attack,
      defense,
      moveType,
      attackerTypes,
      defenderTypes,
      defenderHPBase
    }) {

      const level = 50;

      // -------------------------
      // タイプ相性表（完全版・日本語）
      // -------------------------
      const typeChart = {
        ノーマル: { いわ: 0.5, ゴースト: 0, はがね: 0.5 },

        ほのお: { くさ: 2, こおり: 2, むし: 2, はがね: 2, ほのお: 0.5, みず: 0.5, いわ: 0.5, ドラゴン: 0.5 },

        みず: { ほのお: 2, じめん: 2, いわ: 2, みず: 0.5, くさ: 0.5, ドラゴン: 0.5 },

        でんき: { みず: 2, ひこう: 2, でんき: 0.5, くさ: 0.5, じめん: 0 },

        くさ: { みず: 2, じめん: 2, いわ: 2, ほのお: 0.5, くさ: 0.5, どく: 0.5, ひこう: 0.5, むし: 0.5, ドラゴン: 0.5, はがね: 0.5 },

        こおり: { くさ: 2, じめん: 2, ひこう: 2, ドラゴン: 2, ほのお: 0.5, みず: 0.5, こおり: 0.5, はがね: 0.5 },

        かくとう: { ノーマル: 2, こおり: 2, いわ: 2, あく: 2, はがね: 2, どく: 0.5, ひこう: 0.5, エスパー: 0.5, むし: 0.5, フェアリー: 0.5, ゴースト: 0 },

        どく: { くさ: 2, フェアリー: 2, どく: 0.5, じめん: 0.5, いわ: 0.5, ゴースト: 0.5, はがね: 0 },

        じめん: { ほのお: 2, でんき: 2, どく: 2, いわ: 2, はがね: 2, くさ: 0.5, むし: 0.5, ひこう: 0 },

        ひこう: { くさ: 2, かくとう: 2, むし: 2, でんき: 0.5, いわ: 0.5, はがね: 0.5 },

        エスパー: { かくとう: 2, どく: 2, エスパー: 0.5, あく: 0 },

        むし: { くさ: 2, エスパー: 2, あく: 2, ほのお: 0.5, かくとう: 0.5, どく: 0.5, ひこう: 0.5, ゴースト: 0.5, はがね: 0.5, フェアリー: 0.5 },

        いわ: { ほのお: 2, こおり: 2, ひこう: 2, むし: 2, かくとう: 0.5, じめん: 0.5, はがね: 0.5 },

        ゴースト: { エスパー: 2, ゴースト: 2, ノーマル: 0, あく: 0.5 },

        ドラゴン: { ドラゴン: 2, はがね: 0.5, フェアリー: 0 },

        あく: { エスパー: 2, ゴースト: 2, かくとう: 0.5, あく: 0.5, フェアリー: 0.5 },

        はがね: { こおり: 2, いわ: 2, フェアリー: 2, ほのお: 0.5, みず: 0.5, でんき: 0.5, はがね: 0.5 },

        フェアリー: { かくとう: 2, ドラゴン: 2, あく: 2, ほのお: 0.5, どく: 0.5, はがね: 0.5 }
      };

      // -------------------------
      // HP計算（努力値MAX）
      // -------------------------
      function calcHPStat(base, level) {
        const iv = 31;
        const ev = 252;

        return Math.floor(
          ((2 * base + iv + Math.floor(ev / 4)) * level) / 100
        ) + level + 10;
      }

      const defenderHP = calcHPStat(defenderHPBase, level);

      // -------------------------
      // タイプ相性（複合対応）
      // -------------------------
      let typeEffectiveness = 1;

      for (let i = 0; i < defenderTypes.length; i++) {
        const defenderType = defenderTypes[i];

        const multiplier =
          (typeChart[moveType] && typeChart[moveType][defenderType]) ?? 1;

        typeEffectiveness = typeEffectiveness * multiplier;
      }

      // -------------------------
      // STAB（複合でも1回だけ）
      // -------------------------
      let stab = 1;

      for (let i = 0; i < attackerTypes.length; i++) {
        if (attackerTypes[i] === moveType) {
          stab = 1.5;
          break;
        }
      }

      // -------------------------
      // ダメージ計算（Lv50固定）
      // -------------------------
      const levelFactor = Math.floor((2 * level) / 5 + 2);

      const attackPower = levelFactor * power * attack;

      const defenseValue = Math.floor(attackPower / defense);

      const divided = Math.floor(defenseValue / 50);

      const baseDamage = divided + 2;

      const minDamage = Math.floor(
        baseDamage * stab * typeEffectiveness * 0.85
      );

      // -------------------------
      // 判定
      // -------------------------
      return minDamage >= defenderHP;
    }

    function sortTable(tableId, colIndex, ascending) {
      alert("ソート処理を開始します（時間がかかる）")
      const table = document.getElementById(tableId);
      // tbody または table 直下の tr を取得（ヘッダー行も含めてすべて取得）
      const rows = Array.from(table.querySelectorAll("tr"));

      // 1行目（インデックス0）はヘッダー行（thの行）なので、それ以外の行を抽出
      const headerRow = rows[0];
      const dataRows = rows.slice(1);

      // データ行をソート
      dataRows.sort((rowA, rowB) => {
        // セルの存在チェック（念のため）
        const cellA = rowA.children[colIndex] ? rowA.children[colIndex].textContent.trim() : "";
        const cellB = rowB.children[colIndex] ? rowB.children[colIndex].textContent.trim() : "";

        // 数値かどうかを判定（空文字は除外）
        const numA = cellA !== "" && !isNaN(cellA) ? parseFloat(cellA) : null;
        const numB = cellB !== "" && !isNaN(cellB) ? parseFloat(cellB) : null;

        if (numA !== null && numB !== null) {
          // 両方数値の場合
          return ascending ? numA - numB : numB - numA;
        } else {
          // 文字列として比較
          return ascending
            ? cellA.localeCompare(cellB, undefined, { numeric: true })
            : cellB.localeCompare(cellA, undefined, { numeric: true });
        }
      });

      // テーブル内を一度クリアして、ヘッダーとソート済みの行を再配置する
      // （これによりバグを防ぎ、確実に描画を更新します）
      table.innerHTML = "";
      table.appendChild(headerRow);
      dataRows.forEach(row => table.appendChild(row));
      alert("ソート処理おわり")
    }
